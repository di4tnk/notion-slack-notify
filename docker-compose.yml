version: '3.8'

services:
  notion-slack:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - FUNCTIONS_TARGET=notifySlack
      - NOTION_TOKEN=${NOTION_TOKEN}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
      - NOTION_NOTIFY_PROPERTY=${NOTION_NOTIFY_PROPERTY:-通知する}
      - NOTION_LAST_NOTIFIED_PROPERTY=${NOTION_LAST_NOTIFIED_PROPERTY:-最終通知日時}
      - NOTION_READERS_PROPERTY=${NOTION_READERS_PROPERTY:-既読者}
      - NOTION_READER_COUNT_PROPERTY=${NOTION_READER_COUNT_PROPERTY:-既読数}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_CHANNEL=${SLACK_CHANNEL:-development-test}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
    volumes:
      - ./src:/workspace/src:ro
      - ./package.json:/workspace/package.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
